<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Silver gradient for the top half -->
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="50%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <!-- Cyan/Blue gradient for the bottom half -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#0099ff" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>
  </defs>

  <!-- Background is transparent so it fits in any navbar -->

  <!-- Top Silver Hook (S-shape Top & half diagonal) -->
  <path d="M 69,32 L 69,24 C 69,19 65,15 60,15 L 40,15 C 35,15 31,19 31,24 L 31,44 C 31,46 32,48 34,49 L 50,54" 
        fill="none" stroke="url(#silver-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Bottom Blue Hook (half diagonal & S-shape Bottom) -->
  <path d="M 50,54 L 66,59 C 68,60 69,62 69,64 L 69,80 C 69,85 65,89 60,89 L 40,89 C 35,89 31,85 31,80 L 31,48" 
        fill="none" stroke="url(#blue-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Speaker & Camera details (Silver matching top) -->
  <rect x="46" y="19" width="8" height="1.8" rx="0.9" fill="#94a3b8" opacity="0.8" />
  <circle cx="58" cy="20" r="0.9" fill="#94a3b8" opacity="0.8" />

  <!-- Bottom Home Notch (Blue matching bottom) -->
  <rect x="47" y="84" width="6" height="1.8" rx="0.9" fill="#0099ff" opacity="0.9" />

  <!-- Coding </> Symbol inside the bottom phone screen -->
  <path d="M 43,65 L 39,69 L 43,73" fill="none" stroke="#00d2ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 48,75 L 52,63" fill="none" stroke="#00d2ff" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 57,65 L 61,69 L 57,73" fill="none" stroke="#00d2ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
